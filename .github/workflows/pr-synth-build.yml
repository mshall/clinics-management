# Validates CDK + web build on pull requests (same path as deploy synth, no AWS credentials).
name: PR synth and build

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/**"
      - "infra/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/cicd-deploy.sh"
      - "scripts/cicd-pre-deploy-backup.sh"
      - "scripts/cicd-diagnostics-on-failure.sh"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: pr-synth-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  synth-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install dependencies
        run: NPM_CONFIG_LOGLEVEL=error npm ci --no-audit --no-fund

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: CDK synth (web build + infra synth)
        run: npm run infra:synth
