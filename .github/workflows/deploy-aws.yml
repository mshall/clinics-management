# Deploys the CDK stack (eu-central-1): VPC, RDS, App Runner API, S3 + CloudFront web.
#
# --- One-time AWS setup (OIDC, recommended) ---
# 1) IAM > Identity providers > Add: provider URL https://token.actions.githubusercontent.com,
#    Audience: sts.amazonaws.com
# 2) IAM > Roles > Create role > Web identity > GitHub > authorize your org/repo.
#    Or create a role with custom trust (replace OWNER, REPO, ACCOUNT_ID):
#      "Principal": { "Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com" }
#      "Action": "sts:AssumeRoleWithWebIdentity"
#      "Condition": {
#        "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#        "StringLike": { "token.actions.githubusercontent.com:sub": "repo:OWNER/REPO:*" }
#      }
# 3) Attach a policy that allows CDK deploy (e.g. AdministratorAccess for simplicity, or scoped CDK policy).
# 4) GitHub repo > Settings > Secrets and variables > Actions > New repository secret:
#      Name:  AWS_DEPLOY_ROLE_ARN
#      Value: arn:aws:iam::990597228737:role/GitHubAction-AssumeRole
#    (Trust policy must allow this repo, e.g. repo:mshall/kiorly-clinics-management:* — see IAM OIDC role.)
#
# 5) Optional — Cursor SDK post-mortem after a failed deploy (same pricing as Cursor usage):
#      Name:  CURSOR_API_KEY
#      Value: API key from https://cursor.com/dashboard/integrations (or team service account).
#    If unset, the "Cursor SDK investigation" job skips quietly. This does not auto-merge fixes.
#
# --- One-time CDK bootstrap (run locally once per account/region) ---
#   npx cdk bootstrap aws://ACCOUNT/eu-central-1
#
# If stack kiorly-clinics-management is ROLLBACK_COMPLETE, delete it in CloudFormation before the next deploy.
#
# If the job shows only "exit code 1", open the "Deploy CDK stack" step log — the real error
# is usually npm/cdk/docker or a CloudFormation event (e.g. App Runner NotStabilized).
#
# --- Why CI cannot "pause, let Cursor fix, resume this CloudFormation step" ---
# CloudFormation/CDK is not a resumable workflow engine: a failed resource (e.g. ApiService
# NotStabilized) fails the whole stack change; AWS rolls back or leaves ROLLBACK_COMPLETE.
# There is no supported "continue from Aws::AppRunner::Service" API. Keeping healthy siblings
# without rollback means splitting stacks (e.g. network+RDS in stack A, App Runner in stack B)
# or accepting partial manual cleanup. For AI-assisted fixes from CI, use an out-of-band step
# (e.g. Cursor TypeScript SDK / Cloud Agent opening a PR) after this workflow fails — not
# inside the same CFN transaction.

name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Until all composite actions ship Node 24 builds, silence Node 20 deprecation noise.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Check GitHub secret
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::Add repository secret AWS_DEPLOY_ROLE_ARN (see workflow header comments)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # CDK DockerImageAsset runs `docker build` during deploy; Buildx avoids flaky default builder.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy CDK stack
        run: bash scripts/cicd-deploy.sh

  # Runs only when deploy fails: pulls CFN + App Runner log context into the job log (no auto-fix).
  post_deploy_diagnostics:
    name: Post-failure AWS diagnostics
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Collect CloudFormation & App Runner diagnostics
        run: bash scripts/cicd-diagnostics-on-failure.sh 2>&1 | tee diagnostics.log

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-deploy-diagnostics
          path: diagnostics.log
          if-no-files-found: warn

  # Optional: Cursor TypeScript SDK analyzes diagnostics + repo (no auto-merge). Needs CURSOR_API_KEY.
  # @see https://cursor.com/docs/api/sdk/typescript
  cursor_investigate_deploy:
    name: Cursor SDK investigation (optional)
    needs: [deploy, post_deploy_diagnostics]
    if: ${{ always() && needs.deploy.result == 'failure' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: aws-deploy-diagnostics
          path: .

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (for @cursor/sdk)
        run: npm ci

      - name: Cursor SDK post-mortem (writes to job summary)
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          DIAGNOSTICS_LOG: diagnostics.log
        run: node scripts/cursor-investigate-deploy-failure.mjs
